<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script type="module">
import sqlite3InitModule from '@sqlite.org/sqlite-wasm'
import { SqliteVectorStore } from '/src/adapters/sqlite-vector-store.ts'

async function runTest() {
  const sqlite3 = await sqlite3InitModule()
  const db = new sqlite3.oo1.DB()
  const store = new SqliteVectorStore(db)
  await store.upsertPage({ id: 'p1', url: 'http://x', title: 'X', capturedAt: 1 })
  await store.putChunks('p1', [
    { id: 'p1#0', pageId: 'p1', index: 0, text: 'sleep' },
    { id: 'p1#1', pageId: 'p1', index: 1, text: 'tax' },
  ])
  await store.setVector('p1#0', new Float32Array([1, 0]))
  await store.setVector('p1#1', new Float32Array([0, 1]))
  const results = await store.search(new Float32Array([0.9, 0.1]), 2)
  window.__TEST_RESULT__ = results[0].chunk.id
}

runTest().catch(e => { window.__TEST_ERROR__ = e.message || String(e) })
</script>
</body>
</html>
