<body>
<article>
<p>광합성은 초록색 식물이 햇빛으로 스스로 양분을 만드는 과정이다. 잎 속의 엽록소라는 초록색 색소가 빛 에너지를 붙잡는다. 식물은 뿌리로 물을 빨아들이고 공기에서 이산화탄소를 받아들인다. 그런 다음 붙잡은 빛 에너지로 물과 이산화탄소를 합쳐 당분을 만들고, 그 당분을 양분으로 살아간다. 그 부산물로 사람과 동물이 숨 쉬는 산소가 나온다.</p>
</article>
